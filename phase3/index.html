<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phase 03 - Kinetic Print</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,700&family=Archivo+Black&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../shared/fx.css" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="../shared/fx.js" defer></script>
  <script src="./script.js" defer></script>
</head>

<body>
  <div class="paper"></div>
  <svg class="distortion-defs" aria-hidden="true">
    <filter id="bgDistort" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.024 0.046" numOctaves="3" seed="17" result="noise">
        <animate attributeName="baseFrequency" dur="14s" values="0.024 0.046;0.038 0.072;0.024 0.046"
          repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="56" xChannelSelector="R" yChannelSelector="G">
        <animate attributeName="scale" dur="10s" values="48;68;48" repeatCount="indefinite" />
      </feDisplacementMap>
    </filter>
  </svg>
  <div class="distortion-layer" aria-hidden="true"></div>
  <div class="distortion-chroma" aria-hidden="true"></div>
  <div class="magnify-stage" aria-hidden="true">
    <div class="magnify-content magnify-content-outer" id="magnifyContent"></div>
    <div class="magnify-core">
      <div class="magnify-content magnify-content-core" id="magnifyContentCore"></div>
    </div>
  </div>
  <div class="water-lens" aria-hidden="true"></div>

  <header>
    <a href="../index.html">Back</a>
    <span>PHASE 03</span>
  </header>

  <main>
    <h1>KINETIC PRINT</h1>
    <p>Editorial paper composition with rotating labels and exaggerated type rhythm.</p>

    <div class="orbit" id="orbit">
      <span class="tag">POSTER</span>
      <span class="tag">MOTION</span>
      <span class="tag">TYPE</span>
      <span class="tag">FORM</span>
    </div>

    <section>
      <article>
        <small>archive issue</small>
        <h2>no. 23</h2>
      </article>
      <article>
        <small>circulation code</small>
        <h2 id="run">0412</h2>
      </article>
      <article>
        <small>mood vector</small>
        <h2 id="mood">latent</h2>
      </article>
    </section>
  </main>
</body>

</html>
